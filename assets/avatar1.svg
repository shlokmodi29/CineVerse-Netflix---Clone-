<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3B30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E0000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad1)" />
  <circle cx="50" cy="42" r="18" fill="#FFFFFF" opacity="0.9" />
  <path d="M25 80 C 25 62, 75 62, 75 80" fill="#FFFFFF" opacity="0.9" />
  <!-- Futuristic visor -->
  <rect x="36" y="36" width="28" height="8" rx="4" fill="#0B0B0B" />
  <line x1="38" y1="40" x2="62" y2="40" stroke="#FF3B30" stroke-width="2" filter="url(#glow)" />
</svg>
