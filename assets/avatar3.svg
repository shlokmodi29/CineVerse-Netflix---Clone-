<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#AF52DE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B0066;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad3)" />
  <circle cx="50" cy="42" r="18" fill="#FFFFFF" opacity="0.9" />
  <path d="M25 80 C 25 62, 75 62, 75 80" fill="#FFFFFF" opacity="0.9" />
  <!-- Futuristic crown/dots -->
  <circle cx="50" cy="38" r="4" fill="#FF2D55" filter="url(#glow)" />
  <circle cx="38" cy="44" r="3" fill="#FF2D55" />
  <circle cx="62" cy="44" r="3" fill="#FF2D55" />
</svg>
